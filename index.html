<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Russian Verbs Trainer</title>
  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="favicon.ico">
</head>
<body>

<header>
  Russian Language Trainer 🇷🇺
</header>
  
  <!-- NAVBAR -->
  <nav>
    <a href="#home">Home</a>
    <a href="#trainer">Random Verb Trainer</a>
    <a href="#tableTrainer">Full Table Trainer</a>
    <!-- <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('trainer')">Random Verb Trainer</button>
    <button onclick="showSection('tableTrainer')">Full Table Trainer</button> -->
  </nav>

  <!-- HOME SECTION -->
  <div id="home">
    <h1>Welcome 👋</h1>
    <p>This is your Russian verb training platform.</p>
  </div>

  <!-- TRAINER SECTION -->
  <div id="trainer" style="display:none;">
    
    <h1>Random Verb Trainer</h1>
  
    <div id="question"></div>
  
    <input type="text" id="answer" placeholder="Type your answer">
    <button onclick="checkAnswer()">Check</button>
  
    <p id="feedback"></p>

  </div>

  <!-- FULL TABLE SECTION -->
  <div id="tableTrainer" style="display:none;">
    <h1>Full Conjugation Trainer</h1>

    <!-- CATEGORY SELECTOR -->
    <div id="categoryBar"></div>

    <!-- VERB LIST -->
    <div id="verbList"></div>
    
    <!-- TABLE VIEW -->
    <div id="tableView" style="display:none;">
      <button onclick="goBackToList()">← Back</button>
      <div id="tableContainer"></div>
      <button onclick="checkTable()">Check</button>
      <p id="tableResult"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
